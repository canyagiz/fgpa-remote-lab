# Alembic configuration. The database URL is NOT set here on purpose - it
# is resolved at runtime in alembic/env.py from the app's own settings
# (which read .env, keeping the real Postgres credentials out of this
# committed file), with an ALEMBIC_DATABASE_URL env var override used only
# for generating the initial migration against a throwaway empty database.

[alembic]
script_location = alembic
prepend_sys_path = .
# Timezone-naive UTC everywhere else in the app; keep migration filenames
# plain (revision hash + slug), no date prefix needed.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
