[defaults]
inventory = inventory/hosts.ini
host_key_checking = False
# A fresh shuttle has no host key we have seen before; the wizard reaches
# it on the trusted lab LAN. Re-enable this once keys are pinned.
retry_files_enabled = False
stdout_callback = yaml
# Readable step-by-step output - this doubles as the wizard's log stream.
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
